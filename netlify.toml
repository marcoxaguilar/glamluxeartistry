# Netlify configuration for Glam Luxe Artistry
# Static HTML site — no build step needed

[build]
  command = "echo 'Static site deployed'"
  publish = "."

# Pretty URLs: Netlify automatically serves about.html at /about
# This is enabled by default on Netlify

# Redirect old Squarespace paths
[[redirects]]
  from = "/services-2"
  to = "/services#occasion"
  status = 301
  force = false

[[redirects]]
  from = "/inquire"
  to = "/contact"
  status = 301
  force = false

# Security and caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
