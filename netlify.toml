# Netlify configuration for Glam Luxe Artistry
# Static HTML site — no build step needed

[build]
  command = "echo 'Static site deployed'"
  publish = "/"

# Redirect old Squarespace paths to new pages
# force = false means these only fire if the old path doesn't match a real file
[[redirects]]
  from = "/services-2"
  to = "/services.html#occasion"
  status = 301
  force = false

[[redirects]]
  from = "/inquire"
  to = "/contact.html"
  status = 301
  force = false

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 301
  force = false

[[redirects]]
  from = "/services"
  to = "/services.html"
  status = 301
  force = false

[[redirects]]
  from = "/testimonials"
  to = "/testimonials.html"
  status = 301
  force = false

[[redirects]]
  from = "/faq"
  to = "/faq.html"
  status = 301
  force = false

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 301
  force = false

[[redirects]]
  from = "/portfolio"
  to = "/portfolio.html"
  status = 301
  force = false

[[redirects]]
  from = "/blog"
  to = "/blog.html"
  status = 301
  force = false

# Security and caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
